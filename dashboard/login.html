<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AURA — Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #000000;
      --surface:     #0d0d12;
      --surface-2:   #131318;
      --border:      rgba(255,255,255,0.07);
      --border-focus:rgba(139,92,246,0.6);
      --text:        #f1f5f9;
      --text-muted:  #64748b;
      --text-subtle: #334155;
      --accent:      #8b5cf6;
      --accent-dim:  rgba(139,92,246,0.15);
      --accent-glow: rgba(139,92,246,0.25);
      --error:       #ef4444;
      --radius:      12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(139,92,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139,92,246,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Ambient glow ── */
    body::after {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(139,92,246,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px 36px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 32px 64px rgba(0,0,0,0.6),
        0 0 80px var(--accent-glow);
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--accent-dim);
      border: 1px solid rgba(139,92,246,0.3);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .logo-sub {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      margin-top: 1px;
    }

    /* ── Heading ── */
    .heading {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .subheading {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* ── Form ── */
    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-subtle);
      pointer-events: none;
      display: flex;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px 42px 12px 40px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.02em;
      transition: border-color 200ms, box-shadow 200ms;
      outline: none;
      -webkit-appearance: none;
    }

    input[type="password"]:focus,
    input[type="text"]:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    input::placeholder {
      color: var(--text-subtle);
      font-weight: 400;
    }

    /* toggle visibility button */
    .toggle-vis {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      padding: 4px;
      border-radius: 6px;
      transition: color 150ms;
    }
    .toggle-vis:hover { color: var(--text); }

    /* ── Submit ── */
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 200ms, transform 100ms, box-shadow 200ms;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }

    .btn-submit:hover {
      background: #7c3aed;
      box-shadow: 0 8px 24px rgba(139,92,246,0.35);
    }

    .btn-submit:active { transform: translateY(1px); }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-submit .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-label { opacity: 0.6; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error banner ── */
    .error-banner {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #fca5a5;
    }

    .error-banner.visible { display: flex; }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0 16px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: 11px;
      color: var(--text-subtle);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── Direct access ── */
    .direct-access {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }

    .direct-access p {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .btn-copy {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 200ms;
    }

    .btn-copy:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .btn-copy.copied {
      border-color: #22c55e;
      color: #22c55e;
      background: rgba(34,197,94,0.08);
    }

    /* ── Footer ── */
    .footer {
      margin-top: 24px;
      font-size: 11px;
      color: var(--text-subtle);
      text-align: center;
      letter-spacing: 0.03em;
    }

    /* ── Reduce motion ── */
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">

      <!-- Logo -->
      <div class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-name">AURA</span>
          <span class="logo-sub">Personal Agent Dashboard</span>
        </div>
      </div>

      <h1 class="heading">Acceso seguro</h1>
      <p class="subheading">Introduce tu token de acceso para continuar.</p>

      <!-- Error -->
      <div class="error-banner" id="errorBanner">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="errorText">Token incorrecto. Inténtalo de nuevo.</span>
      </div>

      <!-- Form -->
      <form id="loginForm" method="get" action="/" autocomplete="off">
        <div class="field">
          <label for="tokenInput">Token de acceso</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              type="password"
              id="tokenInput"
              name="token"
              placeholder="Pega tu token aquí"
              autocomplete="off"
              spellcheck="false"
              required
              autofocus
            />
            <button type="button" class="toggle-vis" id="toggleVis" aria-label="Mostrar/ocultar token" tabindex="-1">
              <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <div class="spinner"></div>
          <span class="btn-label">Entrar al dashboard</span>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </form>

      <div class="divider"><span>o acceso directo</span></div>

      <!-- Direct access copy -->
      <div class="direct-access">
        <p>Copia la URL completa con token incluido y guárdala como marcador — acceso con un clic, sin volver a escribir.</p>
        <button type="button" class="btn-copy" id="copyBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <span id="copyLabel">Copiar URL de acceso</span>
        </button>
      </div>

    </div>

    <p class="footer">Sistema privado · Solo uso autorizado</p>
  </div>

  <script>
    // Read token from URL if present (means server bounced us here after invalid token)
    const params = new URLSearchParams(window.location.search);
    const urlToken = params.get('token');
    if (urlToken) {
      document.getElementById('tokenInput').value = urlToken;
      document.getElementById('errorBanner').classList.add('visible');
    }

    // Toggle visibility
    const toggleBtn = document.getElementById('toggleVis');
    const input = document.getElementById('tokenInput');
    const eyeIcon = document.getElementById('eyeIcon');
    toggleBtn.addEventListener('click', () => {
      const isPass = input.type === 'password';
      input.type = isPass ? 'text' : 'password';
      eyeIcon.innerHTML = isPass
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    });

    // Submit with loading state
    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    form.addEventListener('submit', () => {
      submitBtn.classList.add('loading');
      submitBtn.disabled = true;
    });

    // Copy full URL with token
    const copyBtn = document.getElementById('copyBtn');
    const copyLabel = document.getElementById('copyLabel');
    copyBtn.addEventListener('click', async () => {
      const token = input.value.trim();
      const base = window.location.origin;
      const url = token ? `${base}/?token=${encodeURIComponent(token)}` : base;
      try {
        await navigator.clipboard.writeText(url);
        copyBtn.classList.add('copied');
        copyLabel.textContent = token ? 'URL copiada — guárdala como marcador' : 'URL copiada';
        setTimeout(() => {
          copyBtn.classList.remove('copied');
          copyLabel.textContent = 'Copiar URL de acceso';
        }, 3000);
      } catch {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = url;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        copyLabel.textContent = '¡Copiado!';
        setTimeout(() => { copyLabel.textContent = 'Copiar URL de acceso'; }, 2000);
      }
    });
  </script>
</body>
</html>
