<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AURA — Acceso</title>
  <style>
    @font-face{font-family:'Anthropic Sans';src:url('/fonts/AnthropicSans-Roman.woff2') format('woff2');font-weight:400;font-style:normal}
    @font-face{font-family:'Anthropic Sans';src:url('/fonts/AnthropicSans-Italic.woff2') format('woff2');font-weight:400;font-style:italic}
    @font-face{font-family:'Styrene A';src:url('/fonts/StyreneA-Regular.otf') format('opentype');font-weight:400}
    @font-face{font-family:'Styrene A';src:url('/fonts/StyreneA-Medium.otf') format('opentype');font-weight:500}
    @font-face{font-family:'Styrene A';src:url('/fonts/StyreneA-Bold.otf') format('opentype');font-weight:700}
    @font-face{font-family:'Anthropic Mono';src:url('/fonts/AnthropicMono-Roman.woff2') format('woff2');font-weight:400}

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    /* ── Design tokens — exact match to dashboard ── */
    :root{
      --bg:     #141413;
      --s1:     #1e1d1b;
      --s2:     #282725;
      --s3:     #33312f;
      --bd:     #3a3835;
      --bdl:    #4a4845;
      --t1:     #faf9f5;
      --t2:     #b0aea5;
      --t3:     #78756f;
      --or:     #d97757;
      --or2:    #c46a4d;
      --or3:    #e8856a;
      --gn:     #788c5d;
      --rd:     #b85c4a;
      --yw:     #c9a84c;
      --bl:     #6a9bcc;
      --sans:   'Anthropic Sans',-apple-system,BlinkMacSystemFont,sans-serif;
      --mono:   'Anthropic Mono','Fira Code',monospace;
      --head:   'Styrene A','Anthropic Sans',sans-serif;
      --r:      6px;
    }

    html,body{
      height:100%;
      background:var(--bg);
      color:var(--t1);
      font-family:var(--sans);
      font-size:13px;
      line-height:1.5;
      -webkit-font-smoothing:antialiased;
    }

    /* ── Subtle warm grid (same as dashboard) ── */
    body::before{
      content:'';
      position:fixed;inset:0;
      background-image:
        linear-gradient(rgba(217,119,87,.025) 1px,transparent 1px),
        linear-gradient(90deg,rgba(217,119,87,.025) 1px,transparent 1px);
      background-size:48px 48px;
      pointer-events:none;z-index:0;
    }

    /* ── Warm ambient glow top ── */
    body::after{
      content:'';
      position:fixed;
      top:-20%;left:50%;
      transform:translateX(-50%);
      width:700px;height:360px;
      background:radial-gradient(ellipse,rgba(217,119,87,.06) 0%,transparent 65%);
      pointer-events:none;z-index:0;
    }

    /* ── Layout ── */
    .wrapper{
      position:relative;z-index:1;
      min-height:100vh;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      padding:24px;
    }

    /* ── Card — same as .card in dashboard ── */
    .card{
      width:100%;max-width:380px;
      background:var(--s1);
      border:1px solid var(--bd);
      border-radius:var(--r);
      padding:32px 28px 28px;
      box-shadow:0 24px 48px rgba(0,0,0,.5);
    }

    /* ── Logo bar — mirrors sidebar .logo ── */
    .logo{
      display:flex;align-items:center;gap:12px;
      margin-bottom:28px;
      padding-bottom:20px;
      border-bottom:1px solid var(--bd);
    }

    .logo-mark{
      width:32px;height:32px;
      background:rgba(217,119,87,.1);
      border:1px solid rgba(217,119,87,.25);
      border-radius:var(--r);
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
    }

    .logo-text{display:flex;flex-direction:column;gap:1px}

    .logo-name{
      font-family:var(--head);font-size:15px;font-weight:700;
      letter-spacing:-.3px;color:var(--or);
    }

    .logo-sub{
      font-size:10px;color:var(--t3);
      letter-spacing:.04em;
    }

    /* ── Heading ── */
    .heading{
      font-family:var(--head);font-size:17px;font-weight:500;
      color:var(--t1);margin-bottom:4px;letter-spacing:-.2px;
    }

    .subheading{
      font-size:12px;color:var(--t3);margin-bottom:24px;line-height:1.55;
    }

    /* ── Error banner ── */
    .error-banner{
      display:none;align-items:center;gap:8px;
      background:rgba(184,92,74,.1);
      border:1px solid rgba(184,92,74,.25);
      border-radius:var(--r);
      padding:9px 12px;margin-bottom:14px;
      font-size:12px;color:var(--rd);
    }
    .error-banner.visible{display:flex}
    .error-banner svg{flex-shrink:0;width:13px;height:13px}

    /* ── Form ── */
    .field{margin-bottom:14px}

    .field label{
      display:block;font-size:10px;font-family:var(--head);font-weight:500;
      text-transform:uppercase;letter-spacing:.06em;
      color:var(--t3);margin-bottom:6px;
    }

    .input-wrap{position:relative}

    .input-icon{
      position:absolute;left:11px;top:50%;transform:translateY(-50%);
      color:var(--t3);pointer-events:none;display:flex;
    }

    input[type="password"],
    input[type="text"]{
      width:100%;
      padding:9px 38px 9px 34px;
      background:var(--s2);
      border:1px solid var(--bd);
      border-radius:var(--r);
      color:var(--t1);
      font-family:var(--sans);font-size:13px;
      outline:none;
      transition:border-color .15s,box-shadow .15s;
      -webkit-appearance:none;
    }

    input[type="password"]:focus,
    input[type="text"]:focus{
      border-color:var(--or);
      box-shadow:0 0 0 2px rgba(217,119,87,.15);
    }

    input::placeholder{color:var(--t3);font-size:12px}

    .toggle-vis{
      position:absolute;right:10px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;
      color:var(--t3);display:flex;padding:3px;
      border-radius:4px;transition:color .15s;
    }
    .toggle-vis:hover{color:var(--t2)}

    /* ── Submit — same style as .btn-usar / .btn-send ── */
    .btn-submit{
      width:100%;
      padding:10px;
      background:var(--or);
      border:none;border-radius:var(--r);
      color:#fff;
      font-family:var(--head);font-size:13px;font-weight:500;
      letter-spacing:.01em;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:8px;
      transition:background .15s;
      margin-top:6px;
    }

    .btn-submit:hover{background:var(--or3)}
    .btn-submit:active{background:var(--or2)}

    .btn-submit:disabled{
      opacity:.45;cursor:not-allowed;
    }

    .btn-submit .spinner{
      display:none;width:13px;height:13px;
      border:2px solid rgba(255,255,255,.3);
      border-top-color:#fff;border-radius:50%;
      animation:spin .6s linear infinite;flex-shrink:0;
    }

    .btn-submit.loading .spinner{display:block}
    .btn-submit.loading .btn-label{opacity:.65}

    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Divider ── */
    .divider{
      display:flex;align-items:center;gap:10px;
      margin:18px 0 14px;
    }
    .divider::before,.divider::after{
      content:'';flex:1;height:1px;background:var(--bd);
    }
    .divider span{
      font-size:10px;color:var(--t3);
      text-transform:uppercase;letter-spacing:.07em;
      font-family:var(--head);
    }

    /* ── Direct access — same as .card ── */
    .direct-access{
      background:var(--s2);
      border:1px solid var(--bd);
      border-radius:var(--r);
      padding:12px 14px;
    }

    .direct-access p{
      font-size:11px;color:var(--t3);margin-bottom:10px;line-height:1.6;
    }

    .btn-copy{
      width:100%;padding:8px 10px;
      background:transparent;
      border:1px solid var(--bd);
      border-radius:var(--r);
      color:var(--t3);
      font-family:var(--head);font-size:11px;font-weight:500;
      cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:7px;
      transition:all .15s;
    }

    .btn-copy:hover{
      border-color:var(--or);color:var(--or);
      background:rgba(217,119,87,.08);
    }

    .btn-copy.copied{
      border-color:var(--gn);color:var(--gn);
      background:rgba(120,140,93,.1);
    }

    /* ── Footer ── */
    .footer{
      margin-top:20px;
      font-size:10px;color:var(--t3);text-align:center;
      letter-spacing:.04em;font-family:var(--mono);
    }

    /* ── Reduce motion ── */
    @media(prefers-reduced-motion:reduce){
      *{transition:none!important;animation:none!important}
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">

      <!-- Logo -->
      <div class="logo">
        <div class="logo-mark">
          <!-- Anthropic diamond-ish logo shape -->
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
            <path d="M12 2 L20 7 L20 17 L12 22 L4 17 L4 7 Z" stroke="#d97757" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M12 2 L12 22 M4 7 L20 17 M20 7 L4 17" stroke="#d97757" stroke-width="1" opacity=".4"/>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-name">AURA</span>
          <span class="logo-sub">Personal Agent · Dashboard</span>
        </div>
      </div>

      <h1 class="heading">Acceso seguro</h1>
      <p class="subheading">Introduce tu token para continuar al panel de control.</p>

      <!-- Error -->
      <div class="error-banner" id="errorBanner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="errorText">Token incorrecto. Inténtalo de nuevo.</span>
      </div>

      <!-- Form -->
      <form id="loginForm" method="get" action="/" autocomplete="off">
        <div class="field">
          <label for="tokenInput">Token de acceso</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              type="password"
              id="tokenInput"
              name="token"
              placeholder="Pega tu token aquí"
              autocomplete="off"
              spellcheck="false"
              required
              autofocus
            />
            <button type="button" class="toggle-vis" id="toggleVis" aria-label="Mostrar/ocultar" tabindex="-1">
              <svg id="eyeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <div class="spinner"></div>
          <span class="btn-label">Entrar al dashboard</span>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </form>

      <div class="divider"><span>o acceso directo</span></div>

      <div class="direct-access">
        <p>Copia la URL con token y guárdala como marcador — acceso instantáneo sin volver a escribir.</p>
        <button type="button" class="btn-copy" id="copyBtn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <span id="copyLabel">Copiar URL de acceso</span>
        </button>
      </div>

    </div>

    <p class="footer">Sistema privado · Solo uso autorizado</p>
  </div>

  <script>
    // Show error if token in URL (server bounced us here)
    const params = new URLSearchParams(window.location.search);
    const urlToken = params.get('token');
    if (urlToken) {
      document.getElementById('tokenInput').value = urlToken;
      document.getElementById('errorBanner').classList.add('visible');
    }

    // Toggle visibility
    const toggleBtn = document.getElementById('toggleVis');
    const input = document.getElementById('tokenInput');
    const eyeIcon = document.getElementById('eyeIcon');
    toggleBtn.addEventListener('click', () => {
      const isPass = input.type === 'password';
      input.type = isPass ? 'text' : 'password';
      eyeIcon.innerHTML = isPass
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    });

    // Submit loading state
    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    form.addEventListener('submit', () => {
      submitBtn.classList.add('loading');
      submitBtn.disabled = true;
    });

    // Copy URL with token
    const copyBtn = document.getElementById('copyBtn');
    const copyLabel = document.getElementById('copyLabel');
    copyBtn.addEventListener('click', async () => {
      const token = input.value.trim();
      const url = token
        ? `${window.location.origin}/?token=${encodeURIComponent(token)}`
        : window.location.origin;
      try {
        await navigator.clipboard.writeText(url);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = url; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
      }
      copyBtn.classList.add('copied');
      copyLabel.textContent = token ? 'URL copiada — guárdala como marcador' : 'URL copiada';
      setTimeout(() => {
        copyBtn.classList.remove('copied');
        copyLabel.textContent = 'Copiar URL de acceso';
      }, 3000);
    });
  </script>
</body>
</html>
