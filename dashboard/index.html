<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA — Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ── Variables ─────────────────────────────────────────────── */
:root {
  --bg:        #0e0d0c;
  --surface:   #161514;
  --surface2:  #1e1c1a;
  --border:    #2a2825;
  --text:      #e8e4de;
  --text2:     #9b978f;
  --orange:    #d97757;
  --green:     #56d364;
  --red:       #f85149;
  --blue:      #6a9bcc;
  --yellow:    #e3b341;
  --sidebar-w: 200px;
  --sidebar-c: 52px;
  --topbar-h:  48px;
  --mono:      'JetBrains Mono', monospace;
  --pixel:     'Press Start 2P', monospace;
  --r:         4px;
  --transition:200ms ease;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--mono);
  background: var(--bg);
  color: var(--text);
  font-size: 12px;
  line-height: 1.5;
}

/* Scanlines */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.05) 2px,
    rgba(0,0,0,.05) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ── Layout ─────────────────────────────────────────────────── */
.app { display: flex; height: 100vh; }

/* ── Sidebar ─────────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: #0a0908;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: width var(--transition), min-width var(--transition);
  overflow: hidden;
  position: relative;
  z-index: 100;
}
#sidebar.collapsed {
  width: var(--sidebar-c);
  min-width: var(--sidebar-c);
}

.sidebar-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  height: var(--topbar-h);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  color: var(--text2);
  flex-shrink: 0;
  transition: color var(--transition);
}
.sidebar-toggle:hover { color: var(--orange); }
.sidebar-toggle svg { flex-shrink: 0; }

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 8px 0;
}
.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  color: var(--text2);
  white-space: nowrap;
  transition: color var(--transition), background var(--transition);
  border-left: 2px solid transparent;
  min-height: 40px;
}
.nav-item:hover { color: var(--text); background: #1e1c1a; }
.nav-item.active {
  color: var(--orange);
  border-left-color: var(--orange);
  background: rgba(217,119,87,.08);
}
.nav-item svg { flex-shrink: 0; }
.nav-label { font-size: 11px; overflow: hidden; }
#sidebar.collapsed .nav-label { display: none; }

/* ── Topbar ─────────────────────────────────────────────────── */
#topbar {
  position: sticky;
  top: 0;
  height: var(--topbar-h);
  background: #0a0908;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 16px;
  z-index: 50;
  flex-shrink: 0;
}

.aura-logo {
  font-family: var(--pixel);
  font-size: 10px;
  color: var(--orange);
  letter-spacing: 2px;
  white-space: nowrap;
}

.kpi-strip {
  display: flex;
  gap: 12px;
  align-items: center;
  flex: 1;
  flex-wrap: wrap;
  overflow: hidden;
}

.kpi-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text2);
  white-space: nowrap;
}
.kpi-pill .dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text2);
  flex-shrink: 0;
}
.kpi-pill .dot.green { background: var(--green); box-shadow: 0 0 4px var(--green); }
.kpi-pill .dot.red   { background: var(--red);   box-shadow: 0 0 4px var(--red); }
.kpi-val { color: var(--text); font-weight: 600; }

.last-updated {
  font-size: 10px;
  color: var(--text2);
  margin-left: auto;
  white-space: nowrap;
}

/* ── Main area ─────────────────────────────────────────────── */
.main-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sections { flex: 1; overflow-y: auto; position: relative; }
.sections::-webkit-scrollbar { width: 6px; }
.sections::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.section { display: none; padding: 20px; }
.section.active { display: block; }

/* ── Cards / shared ─────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px;
}
.card-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
}

/* ── KPI Cards row ─────────────────────────────────────────── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}
.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px 14px;
}
.kpi-card .label { font-size: 10px; color: var(--text2); margin-bottom: 4px; }
.kpi-card .value { font-size: 22px; font-weight: 700; line-height: 1; }
.kpi-card .sub { font-size: 10px; color: var(--text2); margin-top: 3px; }
.kpi-card.ok .value    { color: var(--green); }
.kpi-card.warn .value  { color: var(--yellow); }
.kpi-card.crit .value  { color: var(--red); }
.kpi-card.info .value  { color: var(--blue); }
.kpi-card.norm .value  { color: var(--text); }

/* ── Brains grid ─────────────────────────────────────────── */
.brains-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}
.brain-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px;
}
.brain-card.best {
  border-color: var(--green);
  box-shadow: 0 0 0 1px rgba(86,211,100,.2);
}
.brain-name { font-weight: 700; font-size: 12px; margin-bottom: 6px; }
.brain-meta { font-size: 10px; color: var(--text2); margin-bottom: 8px; }
.progress-bar-wrap {
  background: var(--border);
  border-radius: 2px;
  height: 4px;
  overflow: hidden;
  margin-bottom: 6px;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s;
}
.fill-ok    { background: var(--green); }
.fill-warn  { background: var(--yellow); }
.fill-crit  { background: var(--red); }

.badge {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
}
.badge-ok         { background: rgba(86,211,100,.15);  color: var(--green); }
.badge-warn       { background: rgba(227,179,65,.15);  color: var(--yellow); }
.badge-rate-limit { background: rgba(248,81,73,.15);   color: var(--red); }
.badge-error      { background: rgba(248,81,73,.15);   color: var(--red); }
.badge-pending    { background: rgba(106,155,204,.15); color: var(--blue); }
.badge-in-progress{ background: rgba(227,179,65,.15);  color: var(--yellow); }
.badge-completed  { background: rgba(86,211,100,.15);  color: var(--green); }
.badge-failed     { background: rgba(248,81,73,.15);   color: var(--red); }
.badge-critical   { background: rgba(248,81,73,.15);   color: var(--red); }
.badge-high       { background: rgba(217,119,87,.15);  color: var(--orange); }
.badge-medium     { background: rgba(227,179,65,.15);  color: var(--yellow); }
.badge-low        { background: rgba(155,151,143,.15); color: var(--text2); }

/* ── Logs preview ─────────────────────────────────────────── */
.log-preview {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 10px 12px;
}
.log-entry {
  font-size: 11px;
  padding: 2px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.log-entry:last-child { border-bottom: none; }
.log-entry.error   { color: var(--red); }
.log-entry.warning { color: var(--yellow); }
.log-entry.info    { color: var(--text); }
.log-entry.debug   { color: var(--text2); }

/* ── Tasks section ─────────────────────────────────────────── */
.filter-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.filter-tab {
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  font-size: 11px;
  font-family: var(--mono);
  background: transparent;
  color: var(--text2);
  transition: all var(--transition);
}
.filter-tab:hover { color: var(--text); border-color: #3a3835; }
.filter-tab.active { border-color: var(--orange); color: var(--orange); background: rgba(217,119,87,.08); }

.task-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }

.task-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  transition: border-color var(--transition);
}
.task-row:hover { border-color: #3a3835; }
.task-row.in-progress { border-left: 3px solid var(--yellow); }
.task-row.completed   { border-left: 3px solid var(--green); opacity: .8; }
.task-row.failed      { border-left: 3px solid var(--red); }
.task-row.pending     { border-left: 3px solid var(--blue); }

.task-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  cursor: pointer;
  user-select: none;
}
.task-header:hover { background: var(--surface2); }

.task-title { flex: 1; font-size: 12px; font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.task-meta  { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.task-category { font-size: 10px; color: var(--text2); }
.task-brain    { font-size: 10px; color: var(--blue); }
.task-age      { font-size: 10px; color: var(--text2); }

.task-expand {
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  display: none;
  background: #111010;
}
.task-expand.open { display: block; }
.task-desc { font-size: 11px; color: var(--text2); margin-bottom: 8px; white-space: pre-wrap; }
.task-result {
  background: #0a0908;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 8px;
  font-size: 11px;
  color: var(--text2);
  white-space: pre-wrap;
  max-height: 200px;
  overflow-y: auto;
  margin-bottom: 10px;
  display: none;
}
.task-result.has-content { display: block; }
.task-actions { display: flex; gap: 6px; flex-wrap: wrap; }

.task-spinner {
  display: inline-block;
  width: 12px;
  height: 12px;
  border: 2px solid var(--border);
  border-top-color: var(--yellow);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Create task form ─────────────────────────────────────── */
.create-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px;
  margin-bottom: 14px;
}
.form-row {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
.form-group label { font-size: 10px; color: var(--text2); }
.form-group input, .form-group select, .form-group textarea {
  background: #0a0908;
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 11px;
  padding: 6px 8px;
  outline: none;
  transition: border-color var(--transition);
  width: 100%;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus { border-color: var(--orange); }
.form-group textarea { resize: vertical; min-height: 50px; }
.form-group select option { background: #161514; }

/* ── Buttons ─────────────────────────────────────────────── */
.btn {
  padding: 5px 12px;
  border-radius: 3px;
  border: 1px solid;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  transition: all var(--transition);
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-orange { background: rgba(217,119,87,.15); border-color: var(--orange); color: var(--orange); }
.btn-orange:hover:not(:disabled) { background: rgba(217,119,87,.3); }
.btn-red    { background: rgba(248,81,73,.12);  border-color: var(--red);    color: var(--red); }
.btn-red:hover:not(:disabled)    { background: rgba(248,81,73,.25); }
.btn-green  { background: rgba(86,211,100,.12); border-color: var(--green);  color: var(--green); }
.btn-green:hover:not(:disabled)  { background: rgba(86,211,100,.25); }
.btn-blue   { background: rgba(106,155,204,.12);border-color: var(--blue);   color: var(--blue); }
.btn-blue:hover:not(:disabled)   { background: rgba(106,155,204,.25); }
.btn-gray   { background: rgba(155,151,143,.1); border-color: var(--border); color: var(--text2); }
.btn-gray:hover:not(:disabled)   { color: var(--text); border-color: #3a3835; }

/* ── Shell section ─────────────────────────────────────────── */
.shell-input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}
.shell-input {
  flex: 1;
  background: #0a0908;
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 7px 10px;
  outline: none;
  transition: border-color var(--transition);
}
.shell-input:focus { border-color: var(--orange); }

.quick-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.shell-output-wrap {
  background: #080706;
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}
.shell-output-bar {
  padding: 6px 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  color: var(--text2);
  display: flex;
  justify-content: space-between;
}
.shell-output {
  padding: 12px;
  font-size: 11px;
  min-height: 200px;
  max-height: 500px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
  line-height: 1.6;
}
.shell-output::-webkit-scrollbar { width: 4px; }
.shell-output::-webkit-scrollbar-thumb { background: var(--border); }
.shell-output.ok   { color: var(--green); }
.shell-output.fail { color: var(--red); }
.shell-output.idle { color: var(--text2); }

/* ── Logs section ─────────────────────────────────────────── */
.logs-output {
  background: #080706;
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 10px 12px;
  min-height: 300px;
  max-height: 70vh;
  overflow-y: auto;
  font-size: 11px;
}
.logs-output::-webkit-scrollbar { width: 4px; }
.logs-output::-webkit-scrollbar-thumb { background: var(--border); }
.logs-controls {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

/* ── Table ────────────────────────────────────────────────── */
.tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
}
.tbl th {
  text-align: left;
  padding: 6px 10px;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.tbl td {
  padding: 8px 10px;
  border-bottom: 1px solid rgba(42,40,37,.5);
  vertical-align: middle;
}
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: rgba(255,255,255,.02); }
.tbl-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: auto; }

/* ── Section header ─────────────────────────────────────── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 8px;
}
.section-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}

/* ── Loading / Error ─────────────────────────────────────── */
.loading-msg, .error-msg {
  padding: 20px;
  text-align: center;
  font-size: 11px;
}
.loading-msg { color: var(--text2); }
.error-msg   { color: var(--red); }

/* ── Misc ─────────────────────────────────────────────────── */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
@media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

.mt { margin-top: 16px; }

.cron-enabled { color: var(--green); }
.cron-disabled { color: var(--red); }

code { font-family: var(--mono); font-size: 10px; color: var(--text2); }
</style>
</head>
<body>
<div class="app">

<!-- ── Sidebar ─────────────────────────────────────────────── -->
<nav id="sidebar">
  <div class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <line x1="2" y1="4" x2="14" y2="4"/>
      <line x1="2" y1="8" x2="14" y2="8"/>
      <line x1="2" y1="12" x2="14" y2="12"/>
    </svg>
  </div>
  <div class="sidebar-nav">
    <div class="nav-item active" data-section="overview">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="1" y="1" width="6" height="6" rx="1"/>
        <rect x="9" y="1" width="6" height="6" rx="1"/>
        <rect x="1" y="9" width="6" height="6" rx="1"/>
        <rect x="9" y="9" width="6" height="6" rx="1"/>
      </svg>
      <span class="nav-label">Overview</span>
    </div>
    <div class="nav-item" data-section="tasks">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M2 4h12M2 8h12M2 12h8"/>
        <circle cx="13" cy="12" r="2"/>
      </svg>
      <span class="nav-label">Tasks</span>
    </div>
    <div class="nav-item" data-section="shell">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="1" y="2" width="14" height="12" rx="1"/>
        <path d="M4 6l3 3-3 3M9 12h3"/>
      </svg>
      <span class="nav-label">Shell</span>
    </div>
    <div class="nav-item" data-section="logs">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M1 3h14M1 7h10M1 11h12M1 15h8"/>
      </svg>
      <span class="nav-label">Logs</span>
    </div>
    <div class="nav-item" data-section="crons">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="8" cy="8" r="6"/>
        <path d="M8 4v4l3 2"/>
      </svg>
      <span class="nav-label">Crons</span>
    </div>
    <div class="nav-item" data-section="mcp">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="4" cy="8" r="2"/>
        <circle cx="12" cy="4" r="2"/>
        <circle cx="12" cy="12" r="2"/>
        <path d="M6 8h4M6 7.5L10 5M6 8.5L10 11"/>
      </svg>
      <span class="nav-label">MCP</span>
    </div>
  </div>
</nav>

<!-- ── Main ──────────────────────────────────────────────────── -->
<div class="main-wrap">

  <!-- Topbar -->
  <div id="topbar">
    <span class="aura-logo">AURA</span>
    <div class="kpi-strip" id="kpiStrip">
      <span class="kpi-pill"><span class="dot" id="dotBot"></span><span id="kpiBot">BOT ...</span></span>
      <span class="kpi-pill">RAM <span class="kpi-val" id="kpiRam">—</span></span>
      <span class="kpi-pill">DISK <span class="kpi-val" id="kpiDisk">—</span></span>
      <span class="kpi-pill">TASKS <span class="kpi-val" id="kpiTasks">—</span></span>
      <span class="kpi-pill">ERRORS <span class="kpi-val" id="kpiErrors">—</span></span>
    </div>
    <span class="last-updated" id="lastUpdated">—</span>
  </div>

        <button class="btn btn-gray" onclick="shellQuick('ps aux | sort -k3 -n | tail -5')">top 5 CPU</button>
        <button class="btn btn-gray" onclick="shellQuick('git -C ~/claude-code-telegram log --oneline -5')">git log</button>
        <button class="btn btn-gray" onclick="shellQuick('launchctl list | grep aura')">launchctl aura</button>
      </div>
      <div class="shell-output-wrap">

          <span id="shellStatus">ready</span>
          <span id="shellExitCode"></span>

        <pre class="shell-output idle" id="shellOutput">Type a command and press Enter or click Run.</pre>

    <!-- ── LOGS ───────────────────────────────────────────────── -->

        <span class="section-title">Logs</span>

          <button class="filter-tab active" data-level="all">ALL</button>
          <button class="filter-tab" data-level="error">ERROR</button>
          <button class="filter-tab" data-level="warning">WARNING</button>

        <button class="btn btn-gray" onclick="refreshLogs()">↻ Refresh</button>

    <!-- ── CRONS ──────────────────────────────────────────────── -->
    <div class="section" id="section-crons">
      <div class="section-header">
        <span class="section-title">Cron Jobs</span>
        <button class="btn btn-gray" onclick="refreshCrons()">↻ Refresh</button>

        <div class="loading-msg">Loading...</div>

  </div><!-- /sections -->
</div><!-- /main-wrap -->

<script>
'use strict';

/* ── State ──────────────────────────────────────────────────── */
const state = {
  currentSection: 'overview',
  taskFilter: 'all',
  logLevel: 'all',
  sidebarCollapsed: false,
  shellHistory: [],
  shellHistoryIdx: -1,
  pollingIntervals: {},
  taskPolling: {},   // id -> intervalId for in-progress tasks
  tasks: [],
  statusData: null,
};

/* ── API ────────────────────────────────────────────────────── */
// Fallback to localhost:8080 when opened from file:// or unknown origin
const API = (window.location.protocol === 'file:' || !window.location.host)
  ? 'http://localhost:8080'
  : window.location.origin;

async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  }).catch(err => { throw new Error(`Cannot reach ${API} — is the bot running? (${err.message})`); });
  if (!res.ok) {
    const text = await res.text().catch(() => res.statusText);
    throw new Error(`HTTP ${res.status}: ${text}`);
  }
  return res.json();
}

/* ── Sidebar ────────────────────────────────────────────────── */
(function initSidebar() {
  const saved = localStorage.getItem('aura-sidebar');
  if (saved === 'collapsed') { collapseRaw(); }
})();

function collapseRaw() {
  document.getElementById('sidebar').classList.add('collapsed');
  state.sidebarCollapsed = true;
}

document.getElementById('sidebarToggle').addEventListener('click', () => {
  const sb = document.getElementById('sidebar');
  state.sidebarCollapsed = !state.sidebarCollapsed;
  sb.classList.toggle('collapsed', state.sidebarCollapsed);
  localStorage.setItem('aura-sidebar', state.sidebarCollapsed ? 'collapsed' : 'expanded');
});

document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    const sec = item.dataset.section;
    navigateTo(sec);
  });
});

function navigateTo(sec) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`.nav-item[data-section="${sec}"]`).classList.add('active');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(`section-${sec}`).classList.add('active');
  state.currentSection = sec;
  // Trigger load on first visit
  if (sec === 'logs') refreshLogs();
  if (sec === 'crons') refreshCrons();
  if (sec === 'mcp') refreshMcp();
}

/* ── Topbar KPI strip ───────────────────────────────────────── */
function updateTopbar(statusData, taskStats) {
  const bot = statusData?.bot;
  const sys = statusData?.system;
  const logs = statusData?.logs;

  const dotBot = document.getElementById('dotBot');
  const kpiBot = document.getElementById('kpiBot');
  if (bot) {
    const running = bot.running;
    dotBot.className = 'dot ' + (running ? 'green' : 'red');
    kpiBot.textContent = 'BOT ' + (running ? '●' : '○');
  }
  if (sys) {
    document.getElementById('kpiRam').textContent = sys.ram_pct + '%';
    document.getElementById('kpiDisk').textContent = sys.disk_pct + '%';
  }
  if (taskStats) {
    document.getElementById('kpiTasks').textContent = taskStats.pending ?? '—';
  }
  if (logs) {
    document.getElementById('kpiErrors').textContent = logs.error_count ?? '—';
  }
  document.getElementById('lastUpdated').textContent = 'updated ' + fmtTime(new Date());
}

/* ── Overview ───────────────────────────────────────────────── */
async function refreshOverview() {
  try {
    const [statusData, tasksData, logsData, brainsData] = await Promise.all([
      apiFetch('/api/status'),
      apiFetch('/api/tasks'),
      apiFetch('/api/logs?n=5'),
      apiFetch('/api/brains'),
    ]);
    state.statusData = statusData;
    state.tasks = tasksData.tasks || [];
    renderOverviewKpis(statusData, tasksData.stats);
    renderBrains(brainsData.brains || [], brainsData.best_available, brainsData.server_time);
    renderLogPreview(logsData.entries || []);
    updateTopbar(statusData, tasksData.stats);
  } catch (err) {
    document.getElementById('overviewKpiGrid').innerHTML =
      `<div class="error-msg">⚠ ${esc(err.message)}</div>`;
  }
}

function renderOverviewKpis(s, stats) {
  const bot = s?.bot || {};
  const sys = s?.system || {};
  const logs = s?.logs || {};
  const ramClass = sys.ram_pct > 85 ? 'crit' : sys.ram_pct > 70 ? 'warn' : 'ok';
  const diskClass = sys.disk_pct > 85 ? 'crit' : sys.disk_pct > 70 ? 'warn' : 'ok';

  document.getElementById('overviewKpiGrid').innerHTML = `
    <div class="kpi-card ${bot.running ? 'ok' : 'crit'}">
      <div class="label">Bot Status</div>
      <div class="value">${bot.running ? 'UP' : 'DOWN'}</div>
      <div class="sub">PID ${bot.pid || '—'}</div>
    </div>
    <div class="kpi-card ${ramClass}">
      <div class="label">RAM Usage</div>
      <div class="value">${sys.ram_pct ?? '—'}%</div>
      <div class="sub">${sys.ram_free_gb?.toFixed(1) ?? '—'} GB free / ${sys.ram_total_gb?.toFixed(1) ?? '—'} GB</div>
    </div>
    <div class="kpi-card ${diskClass}">
      <div class="label">Disk Usage</div>
      <div class="value">${sys.disk_pct ?? '—'}%</div>
      <div class="sub">${sys.disk_free_gb?.toFixed(1) ?? '—'} GB free</div>
    </div>
    <div class="kpi-card info">
      <div class="label">Tasks Pending</div>
      <div class="value">${stats?.pending ?? '—'}</div>
      <div class="sub">${stats?.total ?? '—'} total · ${stats?.in_progress ?? '—'} running</div>
    </div>
    <div class="kpi-card ${(logs.error_count > 0) ? 'crit' : 'ok'}">
      <div class="label">Errors</div>
      <div class="value">${logs.error_count ?? '—'}</div>
      <div class="sub">in log file</div>
    </div>
  `;
}

/* ── Brain countdown timers ─────────────────────────────────── */
// Map: brain_name -> {recover_at (unix timestamp), intervalId}
const _brainCountdowns = {};

function _startCountdown(brainName, recoverAt, serverTime) {
  // Clear existing timer for this brain
  if (_brainCountdowns[brainName]) clearInterval(_brainCountdowns[brainName]);
  const el = document.getElementById(`cd-${brainName}`);
  if (!el) return;

  const offset = Date.now() / 1000 - serverTime; // client/server clock diff
  function tick() {
    const now = Date.now() / 1000 - offset;
    const rem = Math.max(0, Math.ceil(recoverAt - now));
    if (!document.getElementById(`cd-${brainName}`)) {
      clearInterval(_brainCountdowns[brainName]);
      return;
    }
    if (rem <= 0) {
      el.textContent = '✅ recuperado';
      el.style.color = 'var(--green)';
      clearInterval(_brainCountdowns[brainName]);
    } else {
      const h = Math.floor(rem / 3600);
      const m = Math.floor((rem % 3600) / 60);
      const s = rem % 60;
      el.textContent = h > 0
        ? `recupera en ${h}h ${m}m`
        : m > 0 ? `recupera en ${m}m ${s}s` : `recupera en ${s}s`;
    }
  }
  tick();
  _brainCountdowns[brainName] = setInterval(tick, 1000);
}

function renderBrains(brains, bestAvailable, serverTime) {
  if (!brains.length) {
    document.getElementById('brainsGrid').innerHTML = '<div class="loading-msg">No brains found.</div>';
    return;
  }

  document.getElementById('brainsGrid').innerHTML = brains.map(b => {
    const usagePct = b.usage_pct ?? 0;
    const fillClass = b.is_rate_limited ? 'fill-crit' : usagePct > 80 ? 'fill-warn' : 'fill-ok';
    const badgeClass = b.is_rate_limited ? 'badge-rate-limit' : b.status === 'warn' ? 'badge-warn' : 'badge-ok';
    const badgeText = b.is_rate_limited ? '⛔ RATE LIMITED' : b.unlimited ? '∞ UNLIMITED' : '✓ OK';
    const isBest = b.name === bestAvailable;

    const cdHtml = b.is_rate_limited && b.recover_at
      ? `<div id="cd-${esc(b.name)}" style="font-size:10px;color:var(--orange);margin-top:4px;"></div>`
      : '';
    const errHtml = b.errors
      ? `<div style="font-size:10px;color:var(--red);margin-top:2px;">${b.errors} errores en ventana</div>`
      : '';
    const windowReset = !b.is_rate_limited
      ? `<span style="font-size:10px;color:var(--text2);">ventana: ${b.window_remaining_str ?? b.window ?? '—'}</span>`
      : '';

    return `
      <div class="brain-card${isBest ? ' best' : ''}">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div class="brain-name">${esc(b.name)}${isBest ? ' <span style="font-size:9px;color:var(--green)">▶ activo</span>' : ''}</div>
          <span class="badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="brain-meta">${esc(b.tier ?? '')}</div>
        <div class="brain-meta">${b.requests ?? 0} / ${b.limit ?? '∞'} · ${b.window ?? ''}</div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill ${fillClass}" style="width:${b.unlimited ? 10 : Math.min(usagePct,100)}%"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:2px;">
          <span style="font-size:10px;color:var(--text2);">${b.unlimited ? 'sin límite' : (usagePct.toFixed(1) + '% usado')}</span>
          ${windowReset}
        </div>
        ${cdHtml}${errHtml}
      </div>
    `;
  }).join('');

  // Start countdown timers for rate-limited brains
  const _st = serverTime ?? (Date.now() / 1000);
  brains.forEach(b => {
    if (b.is_rate_limited && b.recover_at) {
      _startCountdown(b.name, b.recover_at, _st);
    }
  });
}

function renderLogPreview(entries) {
  if (!entries.length) {
    document.getElementById('logPreview').innerHTML = '<div class="loading-msg">No logs.</div>';
    return;
  }
  document.getElementById('logPreview').innerHTML = entries.map(e => {
    const lvl = (e.level || 'info').toLowerCase();
    return `<div class="log-entry ${lvl}">${esc(e.text || '')}</div>`;
  }).join('');
}

/* ── Tasks ──────────────────────────────────────────────────── */
let _taskFilterStatus = 'all';

document.querySelectorAll('#taskFilterTabs .filter-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#taskFilterTabs .filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    _taskFilterStatus = btn.dataset.status;
    renderTaskList(state.tasks);
  });
});

async function refreshTasks() {
  const el = document.getElementById('taskList');
  try {
    const data = await apiFetch('/api/tasks');
    state.tasks = data.tasks || [];
    renderTaskList(state.tasks);
    updateTopbar(state.statusData, data.stats);
  } catch (err) {
    el.innerHTML = `<div class="error-msg">API error: ${esc(err.message)}</div>`;
  }
}

function renderTaskList(tasks) {
  const el = document.getElementById('taskList');
  let filtered = tasks;
  if (_taskFilterStatus !== 'all') {
    filtered = tasks.filter(t => t.status === _taskFilterStatus);
  }
  if (!filtered.length) {
    el.innerHTML = '<div class="loading-msg">No tasks.</div>';
    return;
  }
  el.innerHTML = filtered.map(t => renderTaskRow(t)).join('');
  // Restore expand state and attach events
  filtered.forEach(t => {
    const hdr = document.getElementById(`task-hdr-${t.id}`);
    const exp = document.getElementById(`task-exp-${t.id}`);
    if (hdr) {
      hdr.addEventListener('click', () => {
        exp.classList.toggle('open');
      });
    }
    // Start polling for in-progress tasks
    if (t.status === 'in_progress' && !state.taskPolling[t.id]) {
      state.taskPolling[t.id] = setInterval(() => pollTask(t.id), 3000);
    }
  });
}

function renderTaskRow(t) {
  const priBadge = `<span class="badge badge-${t.priority || 'low'}">${(t.priority || 'low').toUpperCase()}</span>`;
  const statusBadge = `<span class="badge badge-${(t.status||'pending').replace('_','-')}">${(t.status||'pending').replace('_',' ').toUpperCase()}</span>`;
  const spinner = (t.status === 'in_progress') ? '<span class="task-spinner"></span>' : '';
  const ago = t.created_at ? relTime(t.created_at) : '';

  const runBtn = t.fix_command
    ? `<button class="btn btn-green" onclick="runTask(event,'${esc(t.id)}')">▶ Run</button>`
    : '';
  const markDoneBtn = (t.status === 'pending' || t.status === 'in_progress')
    ? `<button class="btn btn-blue" onclick="markDone(event,'${esc(t.id)}')">✓ Done</button>`
    : '';
  const delBtn = `<button class="btn btn-red" onclick="deleteTask(event,'${esc(t.id)}')">🗑 Delete</button>`;

  const resultHtml = t.result
    ? `<pre class="task-result has-content">${esc(t.result)}</pre>`
    : `<pre class="task-result"></pre>`;

  return `
    <div class="task-row ${(t.status||'pending').replace('_','-')}" id="task-row-${esc(t.id)}">
      <div class="task-header" id="task-hdr-${esc(t.id)}">
        ${spinner}
        ${priBadge}
        ${statusBadge}
        <span class="task-title">${esc(t.title || '—')}</span>
        <div class="task-meta">
          ${t.category ? `<span class="task-category">${esc(t.category)}</span>` : ''}
          ${t.brain ? `<span class="task-brain">${esc(t.brain)}</span>` : ''}
          <span class="task-age">${ago}</span>
        </div>
      </div>
      <div class="task-expand" id="task-exp-${esc(t.id)}">
        ${t.description ? `<div class="task-desc">${esc(t.description)}</div>` : ''}
        ${resultHtml}
        <div class="task-actions">
          ${runBtn}${markDoneBtn}${delBtn}
        </div>
      </div>
    </div>
  `;
}

async function runTask(ev, id) {
  ev.stopPropagation();
  const btn = ev.target;
  btn.disabled = true;
  btn.textContent = '...';
  try {
    const data = await apiFetch(`/api/tasks/${id}/run`, { method: 'POST' });
    if (!data.ok && data.error === 'no_command') {
      showTaskMsg(id, 'No auto-fix command configured.', 'warn');
    } else if (data.ok) {
      showTaskMsg(id, 'Started.', 'ok');
      if (!state.taskPolling[id]) {
        state.taskPolling[id] = setInterval(() => pollTask(id), 3000);
      }
    } else {
      showTaskMsg(id, data.message || 'Unknown error.', 'err');
    }
  } catch (err) {
    showTaskMsg(id, 'Error: ' + err.message, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ Run';
  }
}

async function pollTask(id) {
  try {
    const data = await apiFetch('/api/tasks');
    const t = (data.tasks || []).find(x => x.id === id);
    if (!t) {
      clearInterval(state.taskPolling[id]);
      delete state.taskPolling[id];
      return;
    }
    // Update that row's DOM
    const row = document.getElementById(`task-row-${id}`);
    if (row) {
      const wasOpen = document.getElementById(`task-exp-${id}`)?.classList.contains('open');
      row.outerHTML = renderTaskRow(t);
      const hdr = document.getElementById(`task-hdr-${id}`);
      const exp = document.getElementById(`task-exp-${id}`);
      if (hdr && exp) {
        if (wasOpen) exp.classList.add('open');
        hdr.addEventListener('click', () => exp.classList.toggle('open'));
      }
    }
    if (t.status !== 'in_progress') {
      clearInterval(state.taskPolling[id]);
      delete state.taskPolling[id];
    }
    state.tasks = data.tasks;
    updateTopbar(state.statusData, data.stats);
  } catch (_) { /* silent */ }
}

async function deleteTask(ev, id) {
  ev.stopPropagation();
  if (!confirm('Delete this task?')) return;
  try {
    await apiFetch(`/api/tasks/${id}`, { method: 'DELETE' });
    state.tasks = state.tasks.filter(t => t.id !== id);
    renderTaskList(state.tasks);
  } catch (err) {
    alert('Error: ' + err.message);
  }
}

async function markDone(ev, id) {
  ev.stopPropagation();
  try {
    await apiFetch(`/api/tasks/${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ status: 'completed' }),
    });
    await refreshTasks();
  } catch (err) {
    alert('Error: ' + err.message);
  }
}

function showTaskMsg(id, msg, type) {
  const exp = document.getElementById(`task-exp-${id}`);
  if (!exp) return;
  let note = exp.querySelector('.task-note');
  if (!note) {
    note = document.createElement('div');
    note.className = 'task-note';
    note.style.cssText = 'font-size:11px;padding:4px 0;';
    exp.insertBefore(note, exp.querySelector('.task-actions'));
  }
  note.style.color = type === 'ok' ? 'var(--green)' : type === 'warn' ? 'var(--yellow)' : 'var(--red)';
  note.textContent = msg;
}

/* ── Create task form ─────────────────────────────────────── */
function openCreateForm() {
  document.getElementById('createFormWrap').style.display = 'block';
}
function closeCreateForm() {
  document.getElementById('createFormWrap').style.display = 'none';
  ['ftTitle','ftDescription','ftFixCmd','ftCategory'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('ftPriority').value = 'medium';
}

async function submitCreateTask() {
  const title = document.getElementById('ftTitle').value.trim();
  if (!title) { alert('Title is required.'); return; }
  const body = {
    title,
    description: document.getElementById('ftDescription').value.trim() || undefined,
    fix_command: document.getElementById('ftFixCmd').value.trim() || undefined,
    priority: document.getElementById('ftPriority').value,
    category: document.getElementById('ftCategory').value.trim() || undefined,
  };
  try {
    const data = await apiFetch('/api/tasks', {
      method: 'POST',
      body: JSON.stringify(body),
    });
    if (data.ok) {
      closeCreateForm();
      await refreshTasks();
    } else {
      alert('Error creating task.');
    }
  } catch (err) {
    alert('Error: ' + err.message);
  }
}

async function postEvaluate() {
  try {
    const data = await apiFetch('/api/tasks/evaluate', { method: 'POST' });
    alert(data.message || 'Evaluation triggered.');
  } catch (err) {
    alert('Error: ' + err.message);
  }
}

/* ── Shell ──────────────────────────────────────────────────── */
const shellInput = document.getElementById('shellInput');
shellInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { runShell(); return; }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (state.shellHistoryIdx < state.shellHistory.length - 1) {
      state.shellHistoryIdx++;
      shellInput.value = state.shellHistory[state.shellHistory.length - 1 - state.shellHistoryIdx] || '';
    }
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (state.shellHistoryIdx > 0) {
      state.shellHistoryIdx--;
      shellInput.value = state.shellHistory[state.shellHistory.length - 1 - state.shellHistoryIdx] || '';
    } else {
      state.shellHistoryIdx = -1;
      shellInput.value = '';
    }
  }
});

function shellQuick(cmd) {
  shellInput.value = cmd;
  runShell();
}

async function runShell() {
  const cmd = shellInput.value.trim();
  if (!cmd) return;

  // History
  if (state.shellHistory[state.shellHistory.length - 1] !== cmd) {
    state.shellHistory.push(cmd);
    if (state.shellHistory.length > 20) state.shellHistory.shift();
  }
  state.shellHistoryIdx = -1;

  const out = document.getElementById('shellOutput');
  const status = document.getElementById('shellStatus');
  const exitEl = document.getElementById('shellExitCode');

  out.className = 'shell-output idle';
  out.textContent = 'Running...';
  status.textContent = 'running';
  exitEl.textContent = '';

  try {
    const data = await apiFetch('/api/shell', {
      method: 'POST',
      body: JSON.stringify({ cmd }),
    });
    out.className = 'shell-output ' + (data.ok ? 'ok' : 'fail');
    out.textContent = data.output ?? '';
    status.textContent = data.ok ? 'success' : 'failed';
    exitEl.textContent = `exit: ${data.exit_code ?? '?'}`;
  } catch (err) {
    out.className = 'shell-output fail';
    out.textContent = 'API error: ' + err.message;
    status.textContent = 'error';
  }
}

/* ── Logs ───────────────────────────────────────────────────── */
let _logLevel = 'all';

document.querySelectorAll('#section-logs .filter-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#section-logs .filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    _logLevel = btn.dataset.level;
    refreshLogs();
  });
});

async function refreshLogs() {
  const el = document.getElementById('logsOutput');
  el.innerHTML = '<div class="loading-msg">Loading...</div>';
  try {
    const lvlParam = (_logLevel !== 'all') ? `&level=${_logLevel}` : '';
    const data = await apiFetch(`/api/logs?n=200${lvlParam}`);
    const entries = data.entries || [];
    if (!entries.length) {
      el.innerHTML = '<div class="loading-msg">No log entries.</div>';
      return;
    }
    el.innerHTML = entries.map(e => {
      const lvl = (e.level || 'info').toLowerCase();
      return `<div class="log-entry ${lvl}">${esc(e.text || '')}</div>`;
    }).join('');
    scrollLogsBottom();
  } catch (err) {
    el.innerHTML = `<div class="error-msg">API error: ${esc(err.message)}</div>`;
  }
}

function scrollLogsBottom() {
  const el = document.getElementById('logsOutput');
  el.scrollTop = el.scrollHeight;
}

/* ── Crons ──────────────────────────────────────────────────── */
async function refreshCrons() {
  const el = document.getElementById('cronsWrap');
  try {
    const data = await apiFetch('/api/crons');
    const jobs = data.jobs || [];
    if (!jobs.length) {
      el.innerHTML = '<div class="loading-msg">No cron jobs.</div>';
      return;
    }
    el.innerHTML = `
      <table class="tbl">
        <thead>
          <tr><th>Name</th><th>Schedule</th><th>Description</th><th>Status</th></tr>
        </thead>
        <tbody>
          ${jobs.map(j => `
            <tr>
              <td>${esc(j.name || '—')}</td>
              <td><code>${esc(j.cron || '—')}</code></td>
              <td>${esc(j.description || '—')}</td>
              <td class="${j.enabled ? 'cron-enabled' : 'cron-disabled'}">${j.enabled ? '● enabled' : '○ disabled'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } catch (err) {
    el.innerHTML = `<div class="error-msg">API error: ${esc(err.message)}</div>`;
  }
}

/* ── MCP ────────────────────────────────────────────────────── */
async function refreshMcp() {
  const el = document.getElementById('mcpWrap');
  try {
    const data = await apiFetch('/api/mcp');
    const servers = data.servers || [];
    if (!servers.length) {

    el.innerHTML = `<div class="error-msg">API error: ${esc(err.message)}</div>`;

/* ── Polling ────────────────────────────────────────────────── */
let _overviewInterval = null;
let _tasksInterval    = null;

function startPolling() {
  stopPolling();
  _overviewInterval = setInterval(() => {
    if (document.visibilityState === 'hidden') return;
    if (state.currentSection === 'overview') refreshOverview();
    else {
      // Still refresh status for topbar KPIs
      apiFetch('/api/status').then(d => {
        state.statusData = d;
        apiFetch('/api/tasks').then(td => updateTopbar(d, td.stats)).catch(() => {});
      }).catch(() => {});
    }
  }, 10000);

  _tasksInterval = setInterval(() => {
    if (document.visibilityState === 'hidden') return;
    if (state.currentSection === 'tasks') refreshTasks();
  }, 10000);
}

function stopPolling() {
  if (_overviewInterval) clearInterval(_overviewInterval);
  if (_tasksInterval)    clearInterval(_tasksInterval);
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') startPolling();
  else stopPolling();
});

/* ── Utils ──────────────────────────────────────────────────── */
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function fmtTime(d) {
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function relTime(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const secs = Math.floor((Date.now() - d) / 1000);
  if (secs < 60)   return secs + 's ago';
  if (secs < 3600) return Math.floor(secs/60) + 'm ago';
  if (secs < 86400)return Math.floor(secs/3600) + 'h ago';
  return Math.floor(secs/86400) + 'd ago';
}

/* ── Init ───────────────────────────────────────────────────── */
(async function init() {
  await refreshOverview();
  await refreshTasks();
  startPolling();
})();
</script>
